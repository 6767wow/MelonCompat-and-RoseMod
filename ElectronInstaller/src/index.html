<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MelonCompat Installer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <img class="brand-logo" src="../assets/logo-cropped.png" alt="" />
        <div class="brand-copy">
          <h1>MelonCompat</h1>
          <p>BepInEx 6 compatibility shim installer</p>
        </div>
      </header>

      <section class="toolbar">
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Search installed Unity games..." />
        </div>
        <button id="refresh" class="icon-button" title="Refresh games">Refresh</button>
        <button id="addGame" class="secondary">Add Game</button>
      </section>

      <section class="content">
        <div id="games" class="game-list" aria-label="Detected games"></div>
      </section>

      <section class="details">
        <div>
          <h2 id="selectedName">No game selected</h2>
          <p id="selectedMeta">Select a game with an existing BepInEx 6 install.</p>
        </div>
        <div class="actions">
          <label class="check">
            <input id="forcePayload" type="checkbox" checked />
            <span>Replace shim files</span>
          </label>
          <button id="pickMelons" class="secondary">Melon DLLs</button>
          <button id="install" class="primary" disabled>Install</button>
        </div>
      </section>

      <section class="log-wrap">
        <pre id="log"></pre>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
